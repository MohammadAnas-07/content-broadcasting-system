version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: cbs_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: cbs
      POSTGRES_PASSWORD: cbs
      POSTGRES_DB: cbs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U cbs -d cbs"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  redis:
    image: redis:7-alpine
    container_name: cbs_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
